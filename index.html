<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Natures Platter</title>

    <!-- Font Awesome -->
    <script src="https://kit.fontawesome.com/61951a945a.js" crossorigin="anonymous"></script>

    <!-- DaisyUI & TailwindCSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google Font - Sora -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@100..800&display=swap" rel="stylesheet">
    <style>
        .font-sora{
            font-family: "Sora", sans-serif;
        }
    </style>
</head>
<body>
    
    <header class="bg-gradient-to-b from-[#FFFFFF] to-[#EFEBE3]">

        <!-- Navbar Start -->
        <section class="max-w-[1300px] mx-auto mt-2">
            <div class="mx-2 md:mx-5">
                <div class="navbar">
                    <div class="navbar-start">
                        <img src="images/logo-header.png" alt="">
                    </div>
                    <div class="navbar-center hidden lg:flex">
                        <ul class="menu menu-horizontal px-1 items-center">
                            <li class="text-lg font-semibold opacity-60"><a>Product</a></li>
                            <li class="text-lg font-semibold opacity-60"><a>Services</a></li>
                            <li class="text-lg font-semibold opacity-60"><a>Contact Us</a></li>
                        </ul>
                    </div>
                    <div class="navbar-end gap-5 hidden lg:flex">
                        <a class="btn btn-neutral shadow-none bg-transparent text-black text-lg font-semibold border-2 border-[rgba(23,152,0,1)] px-8 py-0 hover:bg-[rgba(23,152,0,1)] hover:text-white">Login</a>
                        <a class="btn btn-neutral shadow-none border-2 border-[rgba(23,152,0,1)] bg-[rgba(23,152,0,1)] text-white text-lg font-semibold  hover:bg-transparent hover:text-black hover:border-[rgba(23,152,0,1)] px-8 py-0">Register</a>
                    </div>
                    <div class="navbar-end flex lg:hidden">
                        <div class="dropdown dropdown-end">
                            <div tabindex="0" role="button" class="btn btn-ghost pr-0 lg:hidden">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                                    stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M4 6h16M4 12h8m-8 6h16" />
                                </svg>
                            </div>
                            <ul tabindex="-1" class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-1 w-52 p-2 shadow">
                                <li class="text-lg font-semibold opacity-60"><a>Product</a></li>
                                <li class="text-lg font-semibold opacity-60"><a>Services</a></li>
                                <li class="text-lg font-semibold opacity-60"><a>Contact Us</a></li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        <!-- Navbar End -->

        <!-- Banner Start -->
        <section class="max-w-[1300px] mx-auto mt-20 lg:mt-30">
            <div class="mx-2 md:mx-5">
                <!-- Content -->
                <div class="flex flex-col items-center space-y-8">
                    <!-- Text -->
                    <div class="max-w-[680px] mx-auto text-center space-y-8">
                        <h1 class="text-6xl font-semibold">Freshness <span class="text-[rgba(23,152,0,1)]">You Can Count</span> On, Prices You’ll <span class="text-[rgba(23,152,0,1)]">Love!</span></h1>
                        <p class="text-base font-semibold opacity-70">Shop your daily essentials at unbeatable prices. From fresh produce to pantry staples, we’ve got you covered every day!</p>
                    </div>
                    <!-- Img -->
                    <div>
                        <img src="images/hero-vegetables.png" alt="">
                    </div>
                </div>
            </div>
        </section>
        <!-- Banner End -->
         
    </header>
    <main>

    </main>
    <footer>

    </footer>

</body>
</html>
